services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mantenimiento
      POSTGRES_USER: mvp
      POSTGRES_PASSWORD: mvp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvp -d mantenimiento"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://mvp:mvp@db:5432/mantenimiento
      SECRET_KEY: change-me-before-production
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      UPLOAD_DIR: /app/storage/uploads
      REPORT_DIR: /app/storage/reports
    ports:
      - "8001:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8001
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
